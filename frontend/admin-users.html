<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta charset="UTF-8">
    <title>Manage Users | BentaBoard Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="bentaboard-notifications.css" rel="stylesheet">
    <link href="css/admin-theme.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <aside class="sidebar admin-sidebar">
        <div class="sidebar-header">
            <img src="img/bentaboard.png" alt="BentaBoard Logo" class="sidebar-logo">
            <div class="sidebar-header-text">
                <h1 class="m-0 text-white" style="font-size: 1.25rem; font-weight: 700;">BentaBoard</h1>
                <p class="m-0" style="font-size: 0.75rem; color: #9ca3af;">Admin Control Panel</p>
            </div>
        </div>
        <div class="text-center mb-3">
            <span class="badge bg-danger rounded-pill px-3 py-1" style="font-size: 0.7rem; letter-spacing: 1px;">
                <i data-lucide="shield-check" style="width: 12px; height: 12px;"></i> ADMIN MODE
            </span>
        </div>
        <div class="nav-links">
            <a href="admin-dashboard.html"><i data-lucide="layout-dashboard"></i> Admin Hub</a>
            <a href="admin-users.html" class="active"><i data-lucide="users"></i> Manage Users</a>
            <a href="admin-reports.html"><i data-lucide="file-text"></i> View All Reports</a>
            <a href="admin-settings.html"><i data-lucide="settings"></i> System Settings</a>
            
        </div>
        <div class="mt-auto">
            <div class="d-flex align-items-center gap-3 mb-4 text-white">
                <div class="bg-danger rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;"><i data-lucide="shield-check" size="20"></i></div>
                <div><div class="fw-bold small" id="userNameDisplay">Admin</div><div class="text-success small" style="font-size: 0.7rem;">● Online</div></div>
            </div>
            <button id="logoutBtn" class="btn btn-danger w-100 btn-lift bg-danger bg-opacity-10 text-danger border-0 d-flex align-items-center justify-content-center gap-2">
                <i data-lucide="log-out" size="18"></i> Logout
            </button>
        </div>
    </aside>

    <main class="main-content">
        <h2 class="fw-bold tracking-tight mb-1">Manage User Accounts</h2>
        <p class="text-muted mb-4">View, manage, and delete registered users across the platform.</p>

        <div class="custom-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminUsersTableBody">
                        <tr><td colspan="6" class="text-center text-muted py-4">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="benta-clock">
        <i data-lucide="clock" style="width: 16px; height: 16px; color: var(--primary);"></i>
        <span id="realTimeClock">--:--</span>
    </div>

    <script src="js/admin-script.js"></script>
</body>
</html>
