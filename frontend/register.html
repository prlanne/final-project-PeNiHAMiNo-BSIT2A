<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta charset="UTF-8">
    <title>Register | BentaBoard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="bentaboard-notifications.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-overlay">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

        <div class="auth-card custom-card w-100" style="max-width: 450px;" id="signupFormContainer">
            <div class="text-center mb-4">
                <img src="img/bentaboard.png" alt="BentaBoard Logo" style="width: 70px; height: 70px; margin-bottom: 15px; border-radius: 50%;">
                <h2 class="fw-bold tracking-tight">Create Account</h2>
                <p class="text-muted small">Get started with BentaBoard</p>
            </div>
            
            <form id="signupForm" onsubmit="handleAuth(event, 'signup')">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Full Name</label>
                    <input type="text" class="form-control py-2" name="regName" placeholder="e.g. John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Username</label>
                    <input type="text" class="form-control py-2" name="regUser" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Email Address</label>
                    <input type="email" class="form-control py-2" name="regEmail" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Password</label>
                    <input type="password" class="form-control py-2" name="regPass" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold btn-lift mt-2">Create Account</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted small">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Login</a></p>
                <!-- ADD THIS to register.html, right after the "Already have an account? Login" paragraph -->
<p class="text-muted small mt-2">
    <a href="role-select.html" class="text-primary fw-bold text-decoration-none">
        <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Back to Role Selection
    </a>
</p>
            </div>
        </div>

    </div>

    <script src="js/notifications.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
