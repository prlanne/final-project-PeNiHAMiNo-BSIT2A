<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta charset="UTF-8">
    <title>Admin Login | BentaBoard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="bentaboard-notifications.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-overlay">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        
        <div class="auth-card custom-card w-100" style="max-width: 450px;" id="adminLoginFormContainer">
            <!-- Admin Badge -->
            <div class="text-center mb-3">
                <span class="badge bg-danger rounded-pill px-4 py-2 mb-3" style="font-size: 0.8rem; letter-spacing: 1px;">
                    <i data-lucide="shield-check" style="width: 14px; height: 14px;"></i> ADMIN PORTAL
                </span>
            </div>
            
            <div class="text-center mb-4">
                <img src="img/bentaboard.png" alt="BentaBoard Logo" style="width: 70px; height: 70px; margin-bottom: 15px; border-radius: 50%;">
                <h2 class="fw-bold tracking-tight">Admin Login</h2>
                <p class="text-muted small">Access the administration panel</p>
            </div>
            
            <form id="adminLoginForm" onsubmit="handleAdminAuth(event, 'login')">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Admin Username</label>
                    <input type="text" class="form-control py-2" name="loginUser" placeholder="Enter admin username" autocomplete="off" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Admin Password</label>
                    <input type="password" class="form-control py-2" name="loginPass" placeholder="Enter admin password" autocomplete="off" required>
                </div>
                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold btn-lift mt-2">Admin Login</button>
            </form>
            
            <div class="text-center mt-4">
                
                <p class="text-muted small mt-2">
                    <a href="role-select.html" class="text-primary fw-bold text-decoration-none">
                        <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Back to Role Selection
                    </a>
                </p>
            </div>
        </div>

    </div>

    <script src="js/jscript.js"></script>
    <script>
        lucide.createIcons();

        // Admin authentication - uses same API but with admin role
        async function handleAdminAuth(e, type) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);

    const loginData = {
        username: formData.get('loginUser'),
        password: formData.get('loginPass')
    };

    try {
        // Use /api/auth/login for admin login
        const response = await fetch('http://localhost:3000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(loginData)
        });
        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('bb_user', data.user.username);
            localStorage.setItem('bb_welcome_triggered', 'true');
            window.location.href = 'admin-dashboard.html';
        } else {
            bentaToast('error', data.msg || 'Login Failed');
        }
    } catch (err) {
        bentaToast('error', 'Could not connect to the server.');
    }
}
    </script>
</body>
</html>
